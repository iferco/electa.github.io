<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador Electoral España</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Simulador Electoral España</h1>
    <p class="subtitle">Paso 1: mapa base de provincias</p>
  </header>

  <main class="layout">
    <section class="map-panel">
      <div id="map"></div>
    </section>

    <aside class="side-panel">
    <h2>Provincia seleccionada</h2>

    <div id="info-box">
        <p><strong>Nombre:</strong> <span id="prov-name">—</span></p>
        <p><strong>Código provincia:</strong> <span id="prov-code">—</span></p>
        <p><strong>Población:</strong> <span id="prov-population">—</span></p>
        <p><strong>Escaños totales:</strong> <span id="prov-total-seats">—</span></p>
    </div>

    <hr />

    <h3>Resultados (Top 6 fuerzas)</h3>
    <div id="election-results-text">
        <p>Selecciona una provincia para ver resultados.</p>
    </div>

    <hr />

    <h3>Estado</h3>
    <p id="status">Cargando mapa...</p>
    </aside>
  </main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="./js/app.js"></script>
</body>
</html>
